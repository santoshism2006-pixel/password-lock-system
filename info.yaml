project:
  title: "Password Lock System"
  author: "Santoshi SM"
  discord: ""
  description: "A simple 4-bit password lock system using Verilog HDL"
  language: "Verilog"
  clock_hz: 1000000

  tiles: "1x1"

  top_module: "tt_um_password_lock"

  source_files:
    - "project.v"

