  ui[6]: "Unused"
  ui[7]: "Unused"

  uo[0]: "Unlock LED"
  uo[1]: "Error LED"
  uo[2]: "Unused"
  uo[3]: "Unused"
  uo[4]: "Unused"
  uo[5]: "Unused"
  uo[6]: "Unused"
  uo[7]: "Unused"

  uio[0]: "Unused"
